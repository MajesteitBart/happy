name: Monorepo Safety Net

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/write-compatibility-evidence.cjs'
      - 'packages/**'
      - '.github/workflows/monorepo-safety-net.yml'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/write-compatibility-evidence.cjs'
      - 'packages/**'
      - '.github/workflows/monorepo-safety-net.yml'
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

jobs:
  fast-checks:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: pnpm typecheck

      - name: Run package unit tests
        run: pnpm test:fast

  focused-contracts:
    name: Parser, server route, and security contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parser and message taxonomy regressions
        run: pnpm test:parser

      - name: Server route regressions
        run: pnpm test:server:routes

      - name: Security regressions
        run: pnpm test:security

  package-builds:
    name: Package builds
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

  compatibility-matrix:
    name: Compatibility matrix evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run compatibility boundary checks
        run: pnpm test:compatibility

      - name: Write compatibility evidence artifact
        run: pnpm evidence:compatibility

      - name: Upload compatibility evidence
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-matrix-node-${{ matrix.node-version }}
          path: artifacts/compatibility-matrix.json

  slow-integration:
    name: Slow integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration checks
        run: pnpm test:integration
